services:
 GoE-PV_surplus:
    build:
      context: ./go-e/
      dockerfile: Dockerfile
    image: goe-pv_surplus:latest
    container_name: GoE-PV_surplus
    environment:
      - TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
    volumes:
      - ./go-e/config_docker:/app/config:ro
      - ./go-e/logs_docker:/app/logs
    restart: unless-stopped
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Optional: Healthcheck
#    healthcheck:
#      test: [ "CMD", "test", "-f", "/app/logs/logfile_Kostal_Piko_BA.log" ]
#      interval: 60s
#      timeout: 10s
#      retries: 3
#      start_period: 30s
    stop_grace_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - smart_home

networks:
  smart_home:
    name: smart_home
    ipam:
      driver: default
      config:
        - subnet: 172.34.0.0/24
          gateway: 172.34.0.1
